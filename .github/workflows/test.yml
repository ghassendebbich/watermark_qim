name: test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy matplotlib scipy Pillow scikit-image opencv-python-headless pytest

      - name: Run tests
        run: python3 -m pytest test_watermark.py --tb=short -v