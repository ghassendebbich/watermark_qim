name: dockerhub_push

on:
  workflow_run:
    workflows: ["test"]
    types:
      - completed

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ghassen420/my-app:${{ github.sha }} .
          docker tag ghassen420/my-app:${{ github.sha }} ghassen420/my-app:latest

      - name: Push Docker image
        run: |
          docker push ghassen420/my-app:${{ github.sha }}
          docker push ghassen420/my-app:latest